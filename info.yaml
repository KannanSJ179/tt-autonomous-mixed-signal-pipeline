yaml_version: 6

project:
  title:       "Autonomous Mixed-Signal Pipeline Core"
  author:      "Kannan S J"
  description: "High-utilization autonomous mixed-signal core with FSM-driven datapath and live analog XOR feedback."
  language:    "Verilog"
  clock_hz:    50_000_000    # 50 MHz

  tiles: "1x2"
  analog_pins: 2           # ua[0] = analog output (sampled into pipeline); ua[1] = analog input
  top_module:  "tt_um_multi_stage_processor"

  source_files:
    - src/project.v

# ---------------------------------------------------------------------------
# Pin descriptions — shown in the TinyTapeout datasheet
# ---------------------------------------------------------------------------
pinout:
  # Inputs — ui_in[7:0]
  ui[0]: "Source select bit 0 (LSB) — chooses 8-bit data operand for pipeline stage 1"
  ui[1]: "Source select bit 1"
  ui[2]: "Source select bit 2 (MSB) — selects among 8 sources: counter, LFSR, shift reg, analog, and combos"
  ui[3]: "FSM hold — high freezes the 8-state autonomous state machine"
  ui[4]: "Debug select bit 0 (LSB) — selects internal signal routed to uio_out debug bus"
  ui[5]: "Debug select bit 1"
  ui[6]: "Debug select bit 2 (MSB) — chooses one of 8 debug channels"
  ui[7]: "Test mode — high bypasses pipeline; uo_out = counter low byte (deterministic)"

  # Outputs — uo_out[7:0]
  uo[0]: "Pipeline output bit 0 (LSB)"
  uo[1]: "Pipeline output bit 1"
  uo[2]: "Pipeline output bit 2"
  uo[3]: "Pipeline output bit 3"
  uo[4]: "Pipeline output bit 4"
  uo[5]: "Pipeline output bit 5"
  uo[6]: "Pipeline output bit 6"
  uo[7]: "Pipeline output bit 7 (MSB)"

  # Bidirectional — uio[7:0]  (uio_oe = 8'b1111_0000 — upper nibble output, lower nibble input)
  uio[0]: "Config bit 0 (input) — ALU secondary operand / shift amount LSB"
  uio[1]: "Config bit 1 (input)"
  uio[2]: "Config bit 2 (input)"
  uio[3]: "Config bit 3 (input) — ALU secondary operand MSB"
  uio[4]: "Debug output bit 4 (part of 8-bit internal state bus)"
  uio[5]: "Debug output bit 5 (part of 8-bit internal state bus)"
  uio[6]: "Debug output bit 6 (part of 8-bit internal state bus)"
  uio[7]: "Debug output bit 7 (part of 8-bit internal state bus)"

  # Analog — ua[5:0]
  ua[0]: "analog_out — yen_top output; digitally sampled into pipeline"
  ua[1]: "analog_in  — yen_top input; drive with an analog signal (0 V to VDD)"
  ua[2]: "Unused analog pin (tie to VSS or leave open)"
  ua[3]: "Unused analog pin (tie to VSS or leave open)"
  ua[4]: "Unused analog pin (tie to VSS or leave open)"
  ua[5]: "Unused analog pin (tie to VSS or leave open)"

# ---------------------------------------------------------------------------
# Documentation
# ---------------------------------------------------------------------------
documentation:
  what_it_does: >
    High-utilization mixed-signal pipeline with a 16-bit counter, LFSR,
    shift register, and 8-bit analog sampler. Five combinational stages
    apply source selection, an autonomous 8-state FSM‑controlled ALU,
    a configurable barrel shift, and live analog XOR injection. An 8‑channel
    debug multiplexer exposes internal states on uio_out. Test mode forces
    a deterministic counter output.

  how_to_test: >
    Release reset, enable clock. Set ui_in[7]=1 for test mode (uo_out = counter).
    Clear test mode; select a data source with ui_in[2:0] and apply a configuration
    operand on uio_in[3:0]. Monitor uio_out[7:4] while sweeping ui_in[6:4] to
    observe internal signals. Assert ui_in[3] (hold) to freeze the FSM. Apply an
    analog signal to ua[1] to verify the sampling and analog XOR feedback path.

  external_hardware: >
    Optional: a function generator or DAC (0 V to VDD) connected to ua[1] to
    test the analog sampling and feedback loop. No external hardware is required
    for pure digital verification.
